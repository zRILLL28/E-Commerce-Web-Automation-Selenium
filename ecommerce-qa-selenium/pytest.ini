[pytest]
# Direktori pencarian test
testpaths = tests

# Nama file test yang dikenali
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opsi default saat menjalankan pytest
addopts =
    --html=reports/report.html
    --self-contained-html
    -v

# Markers yang tersedia
markers =
    smoke: Test paling kritikal (cepat, subset kecil)
    regression: Full regression test
    login: Test untuk fitur login
    cart: Test untuk fitur cart
    checkout: Test untuk fitur checkout
